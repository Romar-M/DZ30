name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage flake8
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Run tests
        env:
          SECRET_KEY: test-secret-key
          DEBUG: True
          DB_NAME: lms_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_PUBLISHABLE_KEY: pk_test_dummy
        run: |
          coverage run manage.py test
          coverage report

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          # Проверка наличия секретов
          if [ -z "$SSH_PRIVATE_KEY" ]; then echo "ERROR: SSH_PRIVATE_KEY is empty"; exit 1; fi
          if [ -z "$SSH_HOST" ]; then echo "ERROR: SSH_HOST is empty"; exit 1; fi
          
          # Настройка SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          
          # Проверка подключения
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes ${SSH_USER}@${SSH_HOST} "echo 'SSH OK'"
          
          # Синхронизация файлов
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" --exclude='.git' --exclude='venv' --exclude='__pycache__' ./ ${SSH_USER}@${SSH_HOST}:/home/deployer/app/
          
          # Создание .env на сервере и перезапуск контейнеров
          ssh -i ~/.ssh/deploy_key ${SSH_USER}@${SSH_HOST} "
            cd /home/deployer/app
            cat > .env << EOF
          SECRET_KEY=$SECRET_KEY
          DEBUG=False
          ALLOWED_HOSTS=$SSH_HOST
          DB_NAME=lms_db
          DB_USER=postgres
          DB_PASSWORD=$DB_PASSWORD
          DB_HOST=db
          DB_PORT=5432
          REDIS_URL=redis://redis:6379/0
          STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
          STRIPE_PUBLISHABLE_KEY=$STRIPE_PUBLISHABLE_KEY
          EOF
            docker compose down
            docker compose build --no-cache
            docker compose up -d
          "